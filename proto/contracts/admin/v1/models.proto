syntax = "proto3";

package zvonilka.admin.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "contracts/common/v1/types.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/admin/v1;adminv1";

enum AccountRole {
  ACCOUNT_ROLE_UNSPECIFIED = 0;
  ACCOUNT_ROLE_OWNER = 1;
  ACCOUNT_ROLE_ADMIN = 2;
  ACCOUNT_ROLE_MODERATOR = 3;
  ACCOUNT_ROLE_SUPPORT = 4;
  ACCOUNT_ROLE_AUDITOR = 5;
}

enum ModerationCaseStatus {
  MODERATION_CASE_STATUS_UNSPECIFIED = 0;
  MODERATION_CASE_STATUS_OPEN = 1;
  MODERATION_CASE_STATUS_UNDER_REVIEW = 2;
  MODERATION_CASE_STATUS_RESOLVED = 3;
  MODERATION_CASE_STATUS_DISMISSED = 4;
  MODERATION_CASE_STATUS_ESCALATED = 5;
}

message JoinRequest {
  string join_request_id = 1;
  string username = 2;
  string display_name = 3;
  string email = 4;
  string phone = 5;
  string note = 6;
  zvonilka.common.v1.JoinRequestStatus status = 7;
  string reviewed_by_user_id = 8;
  string decision_reason = 9;
  google.protobuf.Timestamp requested_at = 10;
  google.protobuf.Timestamp reviewed_at = 11;
  google.protobuf.Timestamp expires_at = 12;
}

message AuditEvent {
  string event_id = 1;
  zvonilka.common.v1.AuditActionType action = 2;
  string actor_user_id = 3;
  string actor_display_name = 4;
  string target_type = 5;
  string target_id = 6;
  string reason = 7;
  string ip_address = 8;
  string user_agent = 9;
  map<string, string> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
}

message ModerationCase {
  string case_id = 1;
  string report_id = 2;
  string reporter_user_id = 3;
  string reported_user_id = 4;
  string conversation_id = 5;
  string message_id = 6;
  string reason = 7;
  ModerationCaseStatus status = 8;
  string assigned_admin_user_id = 9;
  string resolution = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp closed_at = 13;
}

message PolicySet {
  bool invite_only = 1;
  bool admin_approval_required = 2;
  bool require_two_factor = 3;
  bool allow_username_changes = 4;
  bool allow_contact_import = 5;
  bool allow_unknown_senders = 6;
  uint64 max_attachment_size_bytes = 7;
  google.protobuf.Duration slow_mode_default = 8;
  google.protobuf.Duration message_retention_default = 9;
  bool enable_federation_experimental = 10;
  google.protobuf.Duration session_ttl = 11;
  google.protobuf.Duration recovery_code_ttl = 12;
}
