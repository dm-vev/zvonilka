syntax = "proto3";

package zvonilka.admin.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "contracts/common/v1/types.proto";
import "contracts/users/v1/users.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/admin/v1;adminv1";

service AdminService {
  rpc ListJoinRequests(ListJoinRequestsRequest) returns (ListJoinRequestsResponse);
  rpc ApproveJoinRequest(ApproveJoinRequestRequest) returns (ApproveJoinRequestResponse);
  rpc RejectJoinRequest(RejectJoinRequestRequest) returns (RejectJoinRequestResponse);
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc SuspendAccount(SuspendAccountRequest) returns (SuspendAccountResponse);
  rpc RestoreAccount(RestoreAccountRequest) returns (RestoreAccountResponse);
  rpc UpdateAccountRoles(UpdateAccountRolesRequest) returns (UpdateAccountRolesResponse);
  rpc CreateInvite(CreateInviteRequest) returns (CreateInviteResponse);
  rpc RevokeInvite(RevokeInviteRequest) returns (RevokeInviteResponse);
  rpc GetPolicySet(GetPolicySetRequest) returns (GetPolicySetResponse);
  rpc UpdatePolicySet(UpdatePolicySetRequest) returns (UpdatePolicySetResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
  rpc ListModerationCases(ListModerationCasesRequest) returns (ListModerationCasesResponse);
  rpc ResolveModerationCase(ResolveModerationCaseRequest) returns (ResolveModerationCaseResponse);
}

enum AccountRole {
  ACCOUNT_ROLE_UNSPECIFIED = 0;
  ACCOUNT_ROLE_OWNER = 1;
  ACCOUNT_ROLE_ADMIN = 2;
  ACCOUNT_ROLE_MODERATOR = 3;
  ACCOUNT_ROLE_SUPPORT = 4;
  ACCOUNT_ROLE_AUDITOR = 5;
}

enum ModerationCaseStatus {
  MODERATION_CASE_STATUS_UNSPECIFIED = 0;
  MODERATION_CASE_STATUS_OPEN = 1;
  MODERATION_CASE_STATUS_UNDER_REVIEW = 2;
  MODERATION_CASE_STATUS_RESOLVED = 3;
  MODERATION_CASE_STATUS_DISMISSED = 4;
  MODERATION_CASE_STATUS_ESCALATED = 5;
}

message JoinRequest {
  string join_request_id = 1;
  string username = 2;
  string display_name = 3;
  string email = 4;
  string phone = 5;
  string note = 6;
  zvonilka.common.v1.JoinRequestStatus status = 7;
  string reviewed_by_user_id = 8;
  string decision_reason = 9;
  google.protobuf.Timestamp requested_at = 10;
  google.protobuf.Timestamp reviewed_at = 11;
  google.protobuf.Timestamp expires_at = 12;
}

message AuditEvent {
  string event_id = 1;
  zvonilka.common.v1.AuditActionType action = 2;
  string actor_user_id = 3;
  string actor_display_name = 4;
  string target_type = 5;
  string target_id = 6;
  string reason = 7;
  string ip_address = 8;
  string user_agent = 9;
  map<string, string> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
}

message ModerationCase {
  string case_id = 1;
  string report_id = 2;
  string reporter_user_id = 3;
  string reported_user_id = 4;
  string conversation_id = 5;
  string message_id = 6;
  string reason = 7;
  ModerationCaseStatus status = 8;
  string assigned_admin_user_id = 9;
  string resolution = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp closed_at = 13;
}

message PolicySet {
  bool invite_only = 1;
  bool admin_approval_required = 2;
  bool require_two_factor = 3;
  bool allow_username_changes = 4;
  bool allow_contact_import = 5;
  bool allow_unknown_senders = 6;
  uint64 max_attachment_size_bytes = 7;
  google.protobuf.Duration slow_mode_default = 8;
  google.protobuf.Duration message_retention_default = 9;
  bool enable_federation_experimental = 10;
  google.protobuf.Duration session_ttl = 11;
  google.protobuf.Duration recovery_code_ttl = 12;
}

message ListJoinRequestsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  zvonilka.common.v1.JoinRequestStatus status_filter = 2;
}

message ListJoinRequestsResponse {
  repeated JoinRequest join_requests = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message ApproveJoinRequestRequest {
  string join_request_id = 1;
  repeated AccountRole roles = 2;
  string note = 3;
  string idempotency_key = 4;
}

message ApproveJoinRequestResponse {
  JoinRequest join_request = 1;
  zvonilka.users.v1.UserProfile profile = 2;
}

message RejectJoinRequestRequest {
  string join_request_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RejectJoinRequestResponse {
  JoinRequest join_request = 1;
}

message CreateAccountRequest {
  string username = 1;
  string display_name = 2;
  string email = 3;
  string phone = 4;
  repeated AccountRole roles = 5;
  string note = 6;
  string invite_code = 7;
  string idempotency_key = 8;
}

message CreateAccountResponse {
  zvonilka.users.v1.UserProfile profile = 1;
  string invite_code = 2;
  google.protobuf.Timestamp invite_expires_at = 3;
}

message SuspendAccountRequest {
  string user_id = 1;
  string reason = 2;
  google.protobuf.Timestamp until = 3;
  string idempotency_key = 4;
}

message SuspendAccountResponse {
  zvonilka.users.v1.UserProfile profile = 1;
}

message RestoreAccountRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RestoreAccountResponse {
  zvonilka.users.v1.UserProfile profile = 1;
}

message UpdateAccountRolesRequest {
  string user_id = 1;
  repeated AccountRole roles = 2;
  string reason = 3;
  string idempotency_key = 4;
}

message UpdateAccountRolesResponse {
  zvonilka.users.v1.UserProfile profile = 1;
}

message CreateInviteRequest {
  repeated AccountRole roles = 1;
  string email = 2;
  string phone = 3;
  google.protobuf.Timestamp expires_at = 4;
  uint32 max_uses = 5;
  string note = 6;
  string idempotency_key = 7;
}

message CreateInviteResponse {
  string invite_code = 1;
  google.protobuf.Timestamp expires_at = 2;
  uint32 max_uses = 3;
}

message RevokeInviteRequest {
  string invite_code = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RevokeInviteResponse {
  bool revoked = 1;
}

message GetPolicySetRequest {}

message GetPolicySetResponse {
  PolicySet policy = 1;
}

message UpdatePolicySetRequest {
  PolicySet policy = 1;
  google.protobuf.FieldMask update_mask = 2;
  string idempotency_key = 3;
}

message UpdatePolicySetResponse {
  PolicySet policy = 1;
}

message ListAuditLogsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  string actor_user_id = 2;
  string target_user_id = 3;
  repeated zvonilka.common.v1.AuditActionType action_types = 4;
  google.protobuf.Timestamp since = 5;
  google.protobuf.Timestamp until = 6;
}

message ListAuditLogsResponse {
  repeated AuditEvent events = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message ListModerationCasesRequest {
  zvonilka.common.v1.PageRequest page = 1;
  ModerationCaseStatus status = 2;
  string reporter_user_id = 3;
  string reported_user_id = 4;
}

message ListModerationCasesResponse {
  repeated ModerationCase moderation_cases = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message ResolveModerationCaseRequest {
  string case_id = 1;
  string resolution = 2;
  bool action_taken = 3;
  string idempotency_key = 4;
}

message ResolveModerationCaseResponse {
  ModerationCase moderation_case = 1;
}
