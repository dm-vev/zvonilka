syntax = "proto3";

package zvonilka.users.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "contracts/common/v1/types.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/users/v1;usersv1";

service UserService {
  rpc GetMyProfile(GetMyProfileRequest) returns (GetMyProfileResponse);
  rpc UpdateMyProfile(UpdateMyProfileRequest) returns (UpdateMyProfileResponse);
  rpc UpdatePrivacySettings(UpdatePrivacySettingsRequest) returns (UpdatePrivacySettingsResponse);
  rpc SetPresence(SetPresenceRequest) returns (SetPresenceResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc ListContacts(ListContactsRequest) returns (ListContactsResponse);
  rpc SyncContacts(SyncContactsRequest) returns (SyncContactsResponse);
  rpc AddContact(AddContactRequest) returns (AddContactResponse);
  rpc RemoveContact(RemoveContactRequest) returns (RemoveContactResponse);
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);
  rpc UnblockUser(UnblockUserRequest) returns (UnblockUserResponse);
  rpc ListBlockedUsers(ListBlockedUsersRequest) returns (ListBlockedUsersResponse);
}

message UserProfile {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  string bio = 4;
  repeated zvonilka.common.v1.Avatar avatars = 5;
  string phone = 6;
  string email = 7;
  bool verified = 8;
  string custom_badge_emoji = 9;
  zvonilka.common.v1.PresenceState presence = 10;
  string custom_status = 11;
  google.protobuf.Timestamp last_seen_at = 12;
  PrivacySettings privacy = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  bool is_contact = 16;
  bool is_blocked = 17;
}

message PrivacySettings {
  zvonilka.common.v1.Visibility phone_visibility = 1;
  zvonilka.common.v1.Visibility last_seen_visibility = 2;
  zvonilka.common.v1.Visibility message_privacy = 3;
  zvonilka.common.v1.Visibility birthday_visibility = 4;
  bool allow_contact_sync = 5;
  bool allow_unknown_senders = 6;
  bool allow_username_search = 7;
}

message Contact {
  string contact_user_id = 1;
  string display_name = 2;
  string username = 3;
  string phone_hash = 4;
  ContactSource source = 5;
  bool starred = 6;
  google.protobuf.Timestamp added_at = 7;
}

message BlockEntry {
  string blocked_user_id = 1;
  string reason = 2;
  google.protobuf.Timestamp blocked_at = 3;
}

message SyncedContact {
  string raw_contact_id = 1;
  string display_name = 2;
  string phone_e164 = 3;
  string email = 4;
  string checksum = 5;
}

message ContactMatch {
  string raw_contact_id = 1;
  string contact_user_id = 2;
  string display_name = 3;
  string username = 4;
}

enum ContactSource {
  CONTACT_SOURCE_UNSPECIFIED = 0;
  CONTACT_SOURCE_MANUAL = 1;
  CONTACT_SOURCE_IMPORTED = 2;
  CONTACT_SOURCE_SYNCED = 3;
  CONTACT_SOURCE_INVITED = 4;
}

message GetMyProfileRequest {}

message GetMyProfileResponse {
  UserProfile profile = 1;
}

message UpdateMyProfileRequest {
  UserProfile profile = 1;
  google.protobuf.FieldMask update_mask = 2;
  string idempotency_key = 3;
}

message UpdateMyProfileResponse {
  UserProfile profile = 1;
}

message UpdatePrivacySettingsRequest {
  PrivacySettings privacy = 1;
  string idempotency_key = 2;
}

message UpdatePrivacySettingsResponse {
  PrivacySettings privacy = 1;
}

message SetPresenceRequest {
  zvonilka.common.v1.PresenceState presence = 1;
  string custom_status = 2;
  google.protobuf.Duration hide_last_seen_for = 3;
  string idempotency_key = 4;
}

message SetPresenceResponse {
  UserProfile profile = 1;
}

message GetUserRequest {
  oneof lookup {
    string user_id = 1;
    string username = 2;
  }
}

message GetUserResponse {
  UserProfile profile = 1;
}

message SearchUsersRequest {
  string query = 1;
  zvonilka.common.v1.PageRequest page = 2;
  bool include_contacts_only = 3;
  bool include_blocked = 4;
}

message SearchUsersResponse {
  repeated UserProfile profiles = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message ListContactsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  string query = 2;
  bool starred_only = 3;
}

message ListContactsResponse {
  repeated Contact contacts = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message SyncContactsRequest {
  repeated SyncedContact contacts = 1;
  string source_device_id = 2;
  string idempotency_key = 3;
}

message SyncContactsResponse {
  repeated ContactMatch matches = 1;
  uint32 new_contacts = 2;
  uint32 updated_contacts = 3;
  uint32 removed_contacts = 4;
}

message AddContactRequest {
  string user_id = 1;
  string alias = 2;
  bool starred = 3;
  string idempotency_key = 4;
}

message AddContactResponse {
  Contact contact = 1;
}

message RemoveContactRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RemoveContactResponse {
  bool removed = 1;
}

message BlockUserRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message BlockUserResponse {
  BlockEntry entry = 1;
}

message UnblockUserRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message UnblockUserResponse {
  bool removed = 1;
}

message ListBlockedUsersRequest {
  zvonilka.common.v1.PageRequest page = 1;
}

message ListBlockedUsersResponse {
  repeated BlockEntry blocked_users = 1;
  zvonilka.common.v1.PageResponse page = 2;
}
