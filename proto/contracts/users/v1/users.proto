syntax = "proto3";

package zvonilka.users.v1;

import "contracts/users/v1/requests.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/users/v1;usersv1";

service UserService {
  rpc GetMyProfile(GetMyProfileRequest) returns (GetMyProfileResponse);
  rpc UpdateMyProfile(UpdateMyProfileRequest) returns (UpdateMyProfileResponse);
  rpc UpdatePrivacySettings(UpdatePrivacySettingsRequest) returns (UpdatePrivacySettingsResponse);
  rpc SetPresence(SetPresenceRequest) returns (SetPresenceResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc ListContacts(ListContactsRequest) returns (ListContactsResponse);
  rpc SyncContacts(SyncContactsRequest) returns (SyncContactsResponse);
  rpc AddContact(AddContactRequest) returns (AddContactResponse);
  rpc RemoveContact(RemoveContactRequest) returns (RemoveContactResponse);
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);
  rpc UnblockUser(UnblockUserRequest) returns (UnblockUserResponse);
  rpc ListBlockedUsers(ListBlockedUsersRequest) returns (ListBlockedUsersResponse);
}
