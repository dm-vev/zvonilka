syntax = "proto3";

package zvonilka.users.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "contracts/common/v1/messages.proto";
import "contracts/common/v1/types.proto";
import "contracts/users/v1/models.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/users/v1;usersv1";

message GetMyProfileRequest {}

message GetMyProfileResponse {
  UserProfile profile = 1;
}

message UpdateMyProfileRequest {
  UserProfile profile = 1;
  google.protobuf.FieldMask update_mask = 2;
  string idempotency_key = 3;
}

message UpdateMyProfileResponse {
  UserProfile profile = 1;
}

message UpdatePrivacySettingsRequest {
  PrivacySettings privacy = 1;
  string idempotency_key = 2;
}

message UpdatePrivacySettingsResponse {
  PrivacySettings privacy = 1;
}

message SetPresenceRequest {
  zvonilka.common.v1.PresenceState presence = 1;
  string custom_status = 2;
  google.protobuf.Duration hide_last_seen_for = 3;
  string idempotency_key = 4;
}

message SetPresenceResponse {
  UserProfile profile = 1;
}

message GetUserRequest {
  oneof lookup {
    string user_id = 1;
    string username = 2;
  }
}

message GetUserResponse {
  UserProfile profile = 1;
}

message SearchUsersRequest {
  string query = 1;
  zvonilka.common.v1.PageRequest page = 2;
  bool include_contacts_only = 3;
  bool include_blocked = 4;
}

message SearchUsersResponse {
  repeated UserProfile profiles = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message ListContactsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  string query = 2;
  bool starred_only = 3;
}

message ListContactsResponse {
  repeated Contact contacts = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message SyncContactsRequest {
  repeated SyncedContact contacts = 1;
  string source_device_id = 2;
  string idempotency_key = 3;
}

message SyncContactsResponse {
  repeated ContactMatch matches = 1;
  uint32 new_contacts = 2;
  uint32 updated_contacts = 3;
  uint32 removed_contacts = 4;
}

message AddContactRequest {
  string user_id = 1;
  string alias = 2;
  bool starred = 3;
  string idempotency_key = 4;
}

message AddContactResponse {
  Contact contact = 1;
}

message RemoveContactRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RemoveContactResponse {
  bool removed = 1;
}

message BlockUserRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message BlockUserResponse {
  BlockEntry entry = 1;
}

message UnblockUserRequest {
  string user_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message UnblockUserResponse {
  bool removed = 1;
}

message ListBlockedUsersRequest {
  zvonilka.common.v1.PageRequest page = 1;
}

message ListBlockedUsersResponse {
  repeated BlockEntry blocked_users = 1;
  zvonilka.common.v1.PageResponse page = 2;
}
