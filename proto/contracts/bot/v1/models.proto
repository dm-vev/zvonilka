syntax = "proto3";

package zvonilka.bot.v1;

import "google/protobuf/timestamp.proto";
import "contracts/common/v1/types.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/bot/v1;botv1";

enum BotScope {
  BOT_SCOPE_UNSPECIFIED = 0;
  BOT_SCOPE_READ_MESSAGES = 1;
  BOT_SCOPE_SEND_MESSAGES = 2;
  BOT_SCOPE_MANAGE_CONVERSATIONS = 3;
  BOT_SCOPE_READ_MEMBERS = 4;
  BOT_SCOPE_MANAGE_MEMBERS = 5;
  BOT_SCOPE_READ_EVENTS = 6;
  BOT_SCOPE_WRITE_EVENTS = 7;
  BOT_SCOPE_READ_PROFILE = 8;
  BOT_SCOPE_MODERATE_USERS = 9;
}

message Bot {
  string bot_id = 1;
  string username = 2;
  string display_name = 3;
  string description = 4;
  zvonilka.common.v1.BotStatus status = 5;
  repeated BotScope scopes = 6;
  string webhook_url = 7;
  string avatar_media_id = 8;
  string created_by_user_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp disabled_at = 12;
  google.protobuf.Timestamp last_delivery_at = 13;
  string last_delivery_error = 14;
}
