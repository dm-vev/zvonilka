syntax = "proto3";

package zvonilka.bot.v1;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "contracts/common/v1/types.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/bot/v1;botv1";

service BotService {
  rpc CreateBot(CreateBotRequest) returns (CreateBotResponse);
  rpc GetBot(GetBotRequest) returns (GetBotResponse);
  rpc ListBots(ListBotsRequest) returns (ListBotsResponse);
  rpc UpdateBot(UpdateBotRequest) returns (UpdateBotResponse);
  rpc RotateBotSecret(RotateBotSecretRequest) returns (RotateBotSecretResponse);
  rpc UpdateWebhook(UpdateWebhookRequest) returns (UpdateWebhookResponse);
  rpc EnableBot(EnableBotRequest) returns (EnableBotResponse);
  rpc DisableBot(DisableBotRequest) returns (DisableBotResponse);
  rpc DeleteBot(DeleteBotRequest) returns (DeleteBotResponse);
}

enum BotScope {
  BOT_SCOPE_UNSPECIFIED = 0;
  BOT_SCOPE_READ_MESSAGES = 1;
  BOT_SCOPE_SEND_MESSAGES = 2;
  BOT_SCOPE_MANAGE_CONVERSATIONS = 3;
  BOT_SCOPE_READ_MEMBERS = 4;
  BOT_SCOPE_MANAGE_MEMBERS = 5;
  BOT_SCOPE_READ_EVENTS = 6;
  BOT_SCOPE_WRITE_EVENTS = 7;
  BOT_SCOPE_READ_PROFILE = 8;
  BOT_SCOPE_MODERATE_USERS = 9;
}

message Bot {
  string bot_id = 1;
  string username = 2;
  string display_name = 3;
  string description = 4;
  zvonilka.common.v1.BotStatus status = 5;
  repeated BotScope scopes = 6;
  string webhook_url = 7;
  string avatar_media_id = 8;
  string created_by_user_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp disabled_at = 12;
  google.protobuf.Timestamp last_delivery_at = 13;
  string last_delivery_error = 14;
}

message CreateBotRequest {
  string display_name = 1;
  string username = 2;
  string description = 3;
  repeated BotScope scopes = 4;
  string webhook_url = 5;
  string avatar_media_id = 6;
  string idempotency_key = 7;
}

message CreateBotResponse {
  Bot bot = 1;
  string bot_token = 2;
}

message GetBotRequest {
  oneof lookup {
    string bot_id = 1;
    string username = 2;
  }
}

message GetBotResponse {
  Bot bot = 1;
}

message ListBotsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  zvonilka.common.v1.BotStatus status = 2;
}

message ListBotsResponse {
  repeated Bot bots = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message UpdateBotRequest {
  Bot bot = 1;
  google.protobuf.FieldMask update_mask = 2;
  string idempotency_key = 3;
}

message UpdateBotResponse {
  Bot bot = 1;
}

message RotateBotSecretRequest {
  string bot_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RotateBotSecretResponse {
  string bot_token = 1;
}

message UpdateWebhookRequest {
  string bot_id = 1;
  string webhook_url = 2;
  bool verify_tls = 3;
  string secret = 4;
  string idempotency_key = 5;
}

message UpdateWebhookResponse {
  Bot bot = 1;
}

message EnableBotRequest {
  string bot_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message EnableBotResponse {
  Bot bot = 1;
}

message DisableBotRequest {
  string bot_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message DisableBotResponse {
  Bot bot = 1;
}

message DeleteBotRequest {
  string bot_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message DeleteBotResponse {
  bool deleted = 1;
}
