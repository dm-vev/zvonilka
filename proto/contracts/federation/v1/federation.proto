syntax = "proto3";

package zvonilka.federation.v1;

import "contracts/federation/v1/requests.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/federation/v1;federationv1";

service FederationService {
  rpc RegisterPeer(RegisterPeerRequest) returns (RegisterPeerResponse);
  rpc GetPeer(GetPeerRequest) returns (GetPeerResponse);
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);
  rpc UpdatePeer(UpdatePeerRequest) returns (UpdatePeerResponse);
  rpc PushEvents(PushEventsRequest) returns (PushEventsResponse);
  rpc PullEvents(PullEventsRequest) returns (PullEventsResponse);
  rpc AcknowledgeReplication(AcknowledgeReplicationRequest) returns (AcknowledgeReplicationResponse);
}
