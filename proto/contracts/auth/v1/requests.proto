syntax = "proto3";

package zvonilka.auth.v1;

import "google/protobuf/timestamp.proto";
import "contracts/auth/v1/models.proto";
import "contracts/common/v1/messages.proto";
import "contracts/common/v1/types.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/auth/v1;authv1";

message GetLoginOptionsRequest {
  oneof identifier {
    string username = 1;
    string email = 2;
    string phone = 3;
  }
}

message GetLoginOptionsResponse {
  repeated LoginOption options = 1;
  bool password_recovery_enabled = 2;
  bool requires_admin_approval = 3;
  zvonilka.common.v1.AccountKind account_kind = 4;
}

message SubmitJoinRequestRequest {
  string idempotency_key = 1;
  string username = 2;
  string display_name = 3;
  string email = 4;
  string phone = 5;
  string note = 6;
  string invite_code = 7;
  string captcha_token = 8;
}

message SubmitJoinRequestResponse {
  string request_id = 1;
  zvonilka.common.v1.JoinRequestStatus status = 2;
  google.protobuf.Timestamp expires_at = 3;
  string next_step = 4;
}

message BeginLoginRequest {
  string idempotency_key = 1;
  oneof identifier {
    string username = 2;
    string email = 3;
    string phone = 4;
  }
  LoginDeliveryChannel delivery_channel = 5;
  string device_name = 6;
  zvonilka.common.v1.DevicePlatform device_platform = 7;
  string client_version = 8;
  string locale = 9;
}

message BeginLoginResponse {
  string challenge_id = 1;
  repeated LoginTarget targets = 2;
  google.protobuf.Timestamp expires_at = 3;
  bool requires_two_factor = 4;
  bool requires_password = 5;
  bool requires_admin_approval = 6;
  string masked_username = 7;
}

message VerifyLoginCodeRequest {
  string challenge_id = 1;
  string code = 2;
  string two_factor_code = 3;
  string recovery_password = 4;
  bool enable_password_recovery = 5;
  string device_name = 6;
  zvonilka.common.v1.DevicePlatform device_platform = 7;
  zvonilka.common.v1.PublicKeyBundle device_key = 8;
  string idempotency_key = 9;
}

message VerifyLoginCodeResponse {
  zvonilka.common.v1.AuthTokens tokens = 1;
  Session session = 2;
  Device device = 3;
  bool recovery_enabled = 4;
}

message AuthenticateBotRequest {
  string bot_token = 1;
  string device_name = 2;
  zvonilka.common.v1.DevicePlatform device_platform = 3;
  zvonilka.common.v1.PublicKeyBundle device_key = 4;
  string client_version = 5;
  string locale = 6;
  string idempotency_key = 7;
}

message AuthenticateBotResponse {
  zvonilka.common.v1.AuthTokens tokens = 1;
  Session session = 2;
  Device device = 3;
}

message RefreshSessionRequest {
  string refresh_token = 1;
  string device_id = 2;
  string idempotency_key = 3;
}

message RefreshSessionResponse {
  zvonilka.common.v1.AuthTokens tokens = 1;
  Session session = 2;
}

message RegisterDeviceRequest {
  string session_id = 1;
  string device_name = 2;
  zvonilka.common.v1.DevicePlatform device_platform = 3;
  zvonilka.common.v1.PublicKeyBundle device_key = 4;
  bool enable_password_recovery = 5;
  string recovery_password = 6;
  string push_token = 7;
  string idempotency_key = 8;
}

message RegisterDeviceResponse {
  Device device = 1;
  Session session = 2;
}

message RotateDeviceKeyRequest {
  string device_id = 1;
  zvonilka.common.v1.PublicKeyBundle device_key = 2;
  string idempotency_key = 3;
}

message RotateDeviceKeyResponse {
  Device device = 1;
}

message ListDevicesRequest {
  zvonilka.common.v1.PageRequest page = 1;
  bool include_revoked = 2;
}

message ListDevicesResponse {
  repeated Device devices = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message ListSessionsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  bool include_revoked = 2;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message RevokeSessionRequest {
  string session_id = 1;
  string reason = 2;
  string idempotency_key = 3;
}

message RevokeSessionResponse {
  bool revoked = 1;
  Session session = 2;
}

message RevokeAllSessionsRequest {
  string reason = 1;
  string idempotency_key = 2;
}

message RevokeAllSessionsResponse {
  uint32 revoked_sessions = 1;
}

message BeginPasswordRecoveryRequest {
  oneof identifier {
    string username = 1;
    string email = 2;
    string phone = 3;
  }
  LoginDeliveryChannel delivery_channel = 4;
  string locale = 5;
  string idempotency_key = 6;
}

message BeginPasswordRecoveryResponse {
  string recovery_challenge_id = 1;
  repeated LoginTarget targets = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message CompletePasswordRecoveryRequest {
  string recovery_challenge_id = 1;
  string code = 2;
  string new_password = 3;
  string new_recovery_password = 4;
  string device_name = 5;
  zvonilka.common.v1.DevicePlatform device_platform = 6;
  zvonilka.common.v1.PublicKeyBundle device_key = 7;
  string idempotency_key = 8;
}

message CompletePasswordRecoveryResponse {
  zvonilka.common.v1.AuthTokens tokens = 1;
  Session session = 2;
  Device device = 3;
  bool recovery_enabled = 4;
}
