syntax = "proto3";

package zvonilka.auth.v1;

import "contracts/auth/v1/requests.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/auth/v1;authv1";

service AuthService {
  rpc SubmitJoinRequest(SubmitJoinRequestRequest) returns (SubmitJoinRequestResponse);
  rpc BeginLogin(BeginLoginRequest) returns (BeginLoginResponse);
  rpc VerifyLoginCode(VerifyLoginCodeRequest) returns (VerifyLoginCodeResponse);
  rpc AuthenticateBot(AuthenticateBotRequest) returns (AuthenticateBotResponse);
  rpc RefreshSession(RefreshSessionRequest) returns (RefreshSessionResponse);
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (RevokeAllSessionsResponse);
}
