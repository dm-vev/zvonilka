syntax = "proto3";

package zvonilka.sync.v1;

import "contracts/common/v1/messages.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/sync/v1;syncv1";

message GetSyncStateRequest {
  string device_id = 1;
}

message GetSyncStateResponse {
  zvonilka.common.v1.SyncState state = 1;
  repeated string pending_conversation_ids = 2;
}

message PullEventsRequest {
  string device_id = 1;
  uint64 from_sequence = 2;
  zvonilka.common.v1.PageRequest page = 3;
  repeated string conversation_ids = 4;
  bool include_presence = 5;
  bool include_moderation = 6;
}

message PullEventsResponse {
  repeated zvonilka.common.v1.EventEnvelope events = 1;
  uint64 next_sequence = 2;
  bool has_more = 3;
  zvonilka.common.v1.SyncState state = 4;
}

message AcknowledgeEventsRequest {
  string device_id = 1;
  uint64 acked_sequence = 2;
  repeated string event_ids = 3;
}

message AcknowledgeEventsResponse {
  zvonilka.common.v1.SyncState state = 1;
}

message SubscribeEventsRequest {
  string device_id = 1;
  uint64 from_sequence = 2;
  repeated string conversation_ids = 3;
}

message SubscribeEventsResponse {
  zvonilka.common.v1.EventEnvelope event = 1;
}
