syntax = "proto3";

package zvonilka.conversation.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "contracts/common/v1/types.proto";
import "contracts/users/v1/users.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/conversation/v1;conversationv1";

service ConversationService {
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc UpdateConversation(UpdateConversationRequest) returns (UpdateConversationResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc AddMembers(AddMembersRequest) returns (AddMembersResponse);
  rpc RemoveMembers(RemoveMembersRequest) returns (RemoveMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  rpc CreateInvite(CreateInviteRequest) returns (CreateInviteResponse);
  rpc ListInvites(ListInvitesRequest) returns (ListInvitesResponse);
  rpc RevokeInvite(RevokeInviteRequest) returns (RevokeInviteResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc ForwardMessage(ForwardMessageRequest) returns (ForwardMessageResponse);
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
}

message ConversationSettings {
  bool only_admins_can_write = 1;
  bool only_admins_can_add_members = 2;
  bool allow_reactions = 3;
  bool allow_forwards = 4;
  bool allow_threads = 5;
  bool require_join_approval = 6;
  bool pinned_messages_only_admins = 7;
  google.protobuf.Duration slow_mode_interval = 8;
}

message Conversation {
  string conversation_id = 1;
  zvonilka.common.v1.ConversationKind kind = 2;
  string title = 3;
  string description = 4;
  string avatar_media_id = 5;
  string owner_user_id = 6;
  ConversationSettings settings = 7;
  bool archived = 8;
  bool muted = 9;
  bool pinned = 10;
  bool hidden = 11;
  uint64 last_sequence = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  google.protobuf.Timestamp last_message_at = 15;
}

message ConversationMember {
  string conversation_id = 1;
  string user_id = 2;
  zvonilka.users.v1.UserProfile profile = 3;
  zvonilka.common.v1.MemberRole role = 4;
  string invited_by_user_id = 5;
  bool muted = 6;
  bool banned = 7;
  google.protobuf.Timestamp joined_at = 8;
  google.protobuf.Timestamp left_at = 9;
}

message Invite {
  string invite_id = 1;
  string conversation_id = 2;
  string code = 3;
  string created_by_user_id = 4;
  repeated zvonilka.common.v1.MemberRole allowed_roles = 5;
  google.protobuf.Timestamp expires_at = 6;
  uint32 max_uses = 7;
  uint32 use_count = 8;
  bool revoked = 9;
  google.protobuf.Timestamp revoked_at = 10;
}

message Reaction {
  string emoji = 1;
  string user_id = 2;
  google.protobuf.Timestamp created_at = 3;
}

message Message {
  string message_id = 1;
  string conversation_id = 2;
  string sender_user_id = 3;
  zvonilka.users.v1.UserProfile sender_profile = 4;
  string sender_device_id = 5;
  zvonilka.common.v1.MessageKind kind = 6;
  zvonilka.common.v1.MessageStatus status = 7;
  zvonilka.common.v1.EncryptedPayload payload = 8;
  repeated zvonilka.common.v1.AttachmentRef attachments = 9;
  zvonilka.common.v1.MessageReference reply_to = 10;
  string thread_id = 11;
  bool silent = 12;
  bool pinned = 13;
  repeated Reaction reactions = 14;
  uint64 view_count = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp edited_at = 17;
  google.protobuf.Timestamp deleted_at = 18;
}

message Thread {
  string thread_id = 1;
  string conversation_id = 2;
  string root_message_id = 3;
  string title = 4;
  uint32 reply_count = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateConversationRequest {
  string idempotency_key = 1;
  zvonilka.common.v1.ConversationKind kind = 2;
  string title = 3;
  string description = 4;
  string avatar_media_id = 5;
  repeated string member_user_ids = 6;
  ConversationSettings settings = 7;
}

message CreateConversationResponse {
  Conversation conversation = 1;
}

message GetConversationRequest {
  string conversation_id = 1;
}

message GetConversationResponse {
  Conversation conversation = 1;
  repeated ConversationMember members = 2;
}

message ListConversationsRequest {
  zvonilka.common.v1.PageRequest page = 1;
  repeated zvonilka.common.v1.ConversationKind kinds = 2;
  bool include_archived = 3;
  bool include_pinned = 4;
  bool include_hidden = 5;
}

message ListConversationsResponse {
  repeated Conversation conversations = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message UpdateConversationRequest {
  Conversation conversation = 1;
  google.protobuf.FieldMask update_mask = 2;
  string idempotency_key = 3;
}

message UpdateConversationResponse {
  Conversation conversation = 1;
}

message ListMembersRequest {
  string conversation_id = 1;
  zvonilka.common.v1.PageRequest page = 2;
}

message ListMembersResponse {
  repeated ConversationMember members = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message AddMembersRequest {
  string conversation_id = 1;
  repeated string user_ids = 2;
  zvonilka.common.v1.MemberRole role = 3;
  string inviter_user_id = 4;
  string idempotency_key = 5;
}

message AddMembersResponse {
  repeated ConversationMember members = 1;
}

message RemoveMembersRequest {
  string conversation_id = 1;
  repeated string user_ids = 2;
  string reason = 3;
  string idempotency_key = 4;
}

message RemoveMembersResponse {
  uint32 removed_members = 1;
}

message UpdateMemberRoleRequest {
  string conversation_id = 1;
  string user_id = 2;
  zvonilka.common.v1.MemberRole role = 3;
  string reason = 4;
  string idempotency_key = 5;
}

message UpdateMemberRoleResponse {
  ConversationMember member = 1;
}

message CreateInviteRequest {
  string conversation_id = 1;
  repeated zvonilka.common.v1.MemberRole allowed_roles = 2;
  google.protobuf.Timestamp expires_at = 3;
  uint32 max_uses = 4;
  string idempotency_key = 5;
}

message CreateInviteResponse {
  Invite invite = 1;
}

message ListInvitesRequest {
  string conversation_id = 1;
  zvonilka.common.v1.PageRequest page = 2;
}

message ListInvitesResponse {
  repeated Invite invites = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message RevokeInviteRequest {
  string conversation_id = 1;
  string invite_id = 2;
  string reason = 3;
  string idempotency_key = 4;
}

message RevokeInviteResponse {
  Invite invite = 1;
}

message ListMessagesRequest {
  string conversation_id = 1;
  zvonilka.common.v1.PageRequest page = 2;
  string thread_id = 3;
  bool include_reactions = 4;
  bool include_deleted = 5;
  bool include_forwarded = 6;
}

message ListMessagesResponse {
  repeated Message messages = 1;
  zvonilka.common.v1.PageResponse page = 2;
}

message GetMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
}

message GetMessageResponse {
  Message message = 1;
}

message SendMessageRequest {
  string conversation_id = 1;
  zvonilka.common.v1.MessageDraft draft = 2;
  string idempotency_key = 3;
}

message SendMessageResponse {
  Message message = 1;
  zvonilka.common.v1.EventEnvelope event = 2;
}

message EditMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
  zvonilka.common.v1.MessageDraft draft = 3;
  string idempotency_key = 4;
}

message EditMessageResponse {
  Message message = 1;
}

message DeleteMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
  bool delete_for_everyone = 3;
  string reason = 4;
  string idempotency_key = 5;
}

message DeleteMessageResponse {
  Message message = 1;
}

message ForwardMessageRequest {
  string from_conversation_id = 1;
  string message_id = 2;
  string to_conversation_id = 3;
  string idempotency_key = 4;
}

message ForwardMessageResponse {
  Message message = 1;
}

message AddReactionRequest {
  string conversation_id = 1;
  string message_id = 2;
  string emoji = 3;
  string idempotency_key = 4;
}

message AddReactionResponse {
  Message message = 1;
}

message RemoveReactionRequest {
  string conversation_id = 1;
  string message_id = 2;
  string emoji = 3;
  string idempotency_key = 4;
}

message RemoveReactionResponse {
  Message message = 1;
}

message PinMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
  bool pin_for_everyone = 3;
  string idempotency_key = 4;
}

message PinMessageResponse {
  Message message = 1;
}

message UnpinMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
  string idempotency_key = 3;
}

message UnpinMessageResponse {
  Message message = 1;
}

message MarkReadRequest {
  string conversation_id = 1;
  string message_id = 2;
  uint64 read_through_sequence = 3;
  string idempotency_key = 4;
}

message MarkReadResponse {
  uint64 read_through_sequence = 1;
}

message CreateThreadRequest {
  string conversation_id = 1;
  string root_message_id = 2;
  string title = 3;
  string idempotency_key = 4;
}

message CreateThreadResponse {
  Thread thread = 1;
}

message GetThreadRequest {
  string conversation_id = 1;
  string thread_id = 2;
}

message GetThreadResponse {
  Thread thread = 1;
  repeated Message messages = 2;
}

message ListThreadsRequest {
  string conversation_id = 1;
  zvonilka.common.v1.PageRequest page = 2;
}

message ListThreadsResponse {
  repeated Thread threads = 1;
  zvonilka.common.v1.PageResponse page = 2;
}
