syntax = "proto3";

package zvonilka.e2ee.v1;

import "contracts/e2ee/v1/requests.proto";

option go_package = "github.com/dm-vev/zvonilka/gen/proto/contracts/e2ee/v1;e2eev1";

service E2EEService {
  rpc UploadDevicePreKeys(UploadDevicePreKeysRequest) returns (UploadDevicePreKeysResponse);
  rpc RotateE2EEKeys(RotateE2EEKeysRequest) returns (RotateE2EEKeysResponse);
  rpc GetAccountPreKeyBundles(GetAccountPreKeyBundlesRequest) returns (GetAccountPreKeyBundlesResponse);
  rpc SetDeviceTrust(SetDeviceTrustRequest) returns (SetDeviceTrustResponse);
  rpc ListDeviceTrusts(ListDeviceTrustsRequest) returns (ListDeviceTrustsResponse);
  rpc CreateDirectSessions(CreateDirectSessionsRequest) returns (CreateDirectSessionsResponse);
  rpc ListDeviceSessions(ListDeviceSessionsRequest) returns (ListDeviceSessionsResponse);
  rpc AcknowledgeDirectSession(AcknowledgeDirectSessionRequest) returns (AcknowledgeDirectSessionResponse);
  rpc PublishGroupSenderKeys(PublishGroupSenderKeysRequest) returns (PublishGroupSenderKeysResponse);
  rpc ListGroupSenderKeys(ListGroupSenderKeysRequest) returns (ListGroupSenderKeysResponse);
  rpc AcknowledgeGroupSenderKey(AcknowledgeGroupSenderKeyRequest) returns (AcknowledgeGroupSenderKeyResponse);
}
