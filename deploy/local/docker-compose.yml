services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: zvonilka
      POSTGRES_PASSWORD: zvonilka
      POSTGRES_DB: zvonilka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  coturn:
    image: coturn/coturn:4.6.3
    command:
      - -n
      - --fingerprint
      - --realm=zvonilka.local
      - --lt-cred-mech
      - --use-auth-secret
      - --static-auth-secret=zvonilka-turn-secret
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --external-ip=127.0.0.1
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zvonilka
      MINIO_ROOT_PASSWORD: zvonilka123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
